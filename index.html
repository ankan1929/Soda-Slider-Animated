<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/fav.jpg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Fruit Soda Slider</title>
</head>
<body>
    
    <header>
        <div>Besharam Engineer</div>
        <nav>
            <ul>
                <li>Home</li>
                <li>Contact</li>
                <li>LogIn</li>
            </ul>
        </nav>
    </header>

    <!-- carousel -->ret3
     <div class="carousel">
        <div class="list">

            <div class="item active" style="--bg: #ea3d41">
                <div class="content">strawberry</div>
                <img src="./img/fruit_strawberry.png" alt="" class="fruit">
            </div>

            <div class="item" style="--bg: #2d5643">
                <div class="content">avocado</div>
                <img src="./img/fruit_avocado.png" alt="" class="fruit">
            </div>

            <div class="item hidden" style="--bg: #e7a043">
                <div class="content">orange</div>
                <img src="./img/fruit_orange.png" alt="" class="fruit">
            </div>

        </div>

        <div class="leaves"></div>
        <div class="mockup"></div>
        <div class="shadow"></div>
        <div class="arrow">
            <button id="prev"> &lt; </button>
            <button id="next"> &#62; </button>
        </div>
     </div>

    <script src="script.js"></script>
</body>
</html>
